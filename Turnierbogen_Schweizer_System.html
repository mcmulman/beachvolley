<body>
  <div class="noprint" style="margin:0 0 8px;padding:0 4mm"><a href="index.html" style="font-size:13px;color:#1f4e79;font-weight:bold;text-decoration:none">← Zur Übersicht</a> <a href="docs/format-schweizer-system.html" target="_blank" style="font-size:12px;color:#1f4e79;font-weight:600;text-decoration:none;padding:4px 10px;border:1px solid #1f4e79;border-radius:4px">📖 Format-Info</a></div>
  <div id="app"></div>

  <script>
    const CFG_KEY = 'sw_univ_cfg';
    const NAMES_KEY = 'sw_univ_names';
    const SCORES_KEY = 'sw_univ_scores';
    const ROUND1_KEY = 'sw_univ_round1';
    const FIELDS_KEY = 'sw_univ_fields';
    const DROPOUT_KEY = 'sw_univ_dropout';
    const START_KEY = 'sw_univ_start';
    const END_KEY = 'sw_univ_end';
    const BASE_START = 600;
    const BASE_END = 840;
    const TEAM_OPTIONS = [6, 8, 10, 12];
    const DEFAULT_ROUNDS = {6:5, 8:7, 10:7, 12:7};
    const MODE_TABLE = [{min:43, mode:'1 Satz bis 21'}, {min:17, mode:'1 Satz bis 15'}];
    const DEFAULT_FIELD_POOL = ['Feld 5', 'Feld 6', 'Feld 7', 'Feld 10', 'Feld 8', 'Feld 9'];
    const DEFAULT_ROUND1_12 = [[2,12],[5,7],[1,3],[9,8],[6,11],[10,4]];

    let NTEAMS = 12;
    let NROUNDS = 7;
    let NFIELDS = 6;
    let MATCHES = {};
    let namesVisible = false;
    let fieldsVisible = false;
    let dropoutVisible = false;
    let liveVisible = false;
    const SESSION_KEY = 'sw_univ';
    const SESSION_FILE = 'Turnierbogen_Schweizer_System.html';
    const SESSION_TITLE = 'Schweizer System (Universal)';
    const TITLE_KEY = SESSION_KEY + '_title';

    function escapeHtml(s){ return String(s).replace(/[&<>\"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
    function loadJSON(key, fallback){ try{ const v = localStorage.getItem(key); return v == null ? fallback : JSON.parse(v); }catch(e){ return fallback; } }
    function saveJSON(key, value){ try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){} }
    function fromMin(min){ const m = ((Math.round(min) % 1440) + 1440) % 1440; const h = Math.floor(m / 60); const mm = m % 60; return String(h).padStart(2,'0') + ':' + String(mm).padStart(2,'0'); }
    function toMin(text){ const m = /^(\d{1,2}):(\d{2})$/.exec(String(text || '').trim()); return m ? (+m[1] * 60 + +m[2]) : null; }
    function defaultRoundsForTeams(t){ return DEFAULT_ROUNDS[t] || 7; }
    function clampRounds(v){ const n = parseInt(v, 10); if(Number.isNaN(n)) return defaultRoundsForTeams(NTEAMS); return Math.max(3, Math.min(11, n)); }
    function applyCfg(cfg){ NTEAMS = cfg.t; NROUNDS = clampRounds(cfg.r); NFIELDS = NTEAMS / 2; }
    function loadCfg(){
      const cfg = loadJSON(CFG_KEY, {t:12, r:7}) || {t:12, r:7};
      const t = TEAM_OPTIONS.includes(+cfg.t) ? +cfg.t : 12;
      applyCfg({t, r: cfg.r});
      return {t:NTEAMS, r:NROUNDS};
    }
    function saveCfg(cfg){ applyCfg(cfg); saveJSON(CFG_KEY, {t:NTEAMS, r:NROUNDS}); }
    function defaultNames(){ const out = {}; for(let t=1;t<=NTEAMS;t++) out[t] = ''; return out; }
    function loadNames(){ const raw = loadJSON(NAMES_KEY, {}) || {}; const out = defaultNames(); for(let t=1;t<=NTEAMS;t++) if(typeof raw[t] === 'string') out[t] = raw[t]; return out; }
    function saveNames(names){ saveJSON(NAMES_KEY, names); }
    function loadScores(){ return loadJSON(SCORES_KEY, {}) || {}; }
    function saveScores(obj){ saveJSON(SCORES_KEY, obj); }
    function loadDroppedTeams(){ const arr = loadJSON(DROPOUT_KEY, []) || []; return new Set(arr.map(Number).filter(t => t >= 1 && t <= NTEAMS)); }
    function saveDroppedTeams(set){ saveJSON(DROPOUT_KEY, Array.from(set).sort((a,b)=>a-b)); }
    function registerSession(){
      try {
        const teams = [];
        for(let i=1; i<=Math.min(4, NTEAMS); i++){
          const el = document.getElementById('tn' + i);
          teams.push(el ? (el.value.trim() || 'Team ' + i) : 'Team ' + i);
        }
        const hasTeams = teams.some((team, idx) => team !== 'Team ' + (idx + 1));
        const hasScores = Array.from(document.querySelectorAll('input.score')).some(el => (el.value || '').trim() !== '');
        const hasFlags = Array.from(document.querySelectorAll('input[type="checkbox"]')).some(el => el.checked);
        const customTitle = localStorage.getItem(TITLE_KEY) || '';
        if(!hasTeams && !hasScores && !hasFlags && !customTitle) return;
        const registry = JSON.parse(localStorage.getItem('beachl_sessions') || '[]');
        const idx = registry.findIndex(s => s.key === SESSION_KEY);
        const entry = {
          key: SESSION_KEY,
          file: SESSION_FILE,
          title: SESSION_TITLE + (customTitle ? ' – ' + customTitle : ''),
          customTitle: customTitle,
          teams: teams,
          savedAt: Date.now()
        };
        if(idx >= 0) registry[idx] = entry;
        else registry.push(entry);
        localStorage.setItem('beachl_sessions', JSON.stringify(registry));
      } catch(e){}
    }
    function saveTitle() {
      const val = (document.getElementById('session-title-input') || {}).value || '';
      try { localStorage.setItem(TITLE_KEY, val); } catch(e) {}
      const disp = document.getElementById('session-title-display');
      if (disp) { disp.textContent = val; disp.style.display = val ? 'block' : 'none'; }
    }

    function restoreTitle() {
      try {
        const val = localStorage.getItem(TITLE_KEY) || '';
        const inp = document.getElementById('session-title-input');
        if (inp) inp.value = val;
        const disp = document.getElementById('session-title-display');
        if (disp) { disp.textContent = val; disp.style.display = val ? 'block' : 'none'; }
      } catch(e) {}
    }

    function manualSave() {
      saveTitle();
      registerSession();
      const btn = document.querySelector('[onclick="manualSave()"]');
      if (btn) { const orig = btn.textContent; btn.textContent = '✓ Gespeichert'; setTimeout(() => btn.textContent = orig, 1500); }
    }
    function defaultFieldNames(){ return DEFAULT_FIELD_POOL.slice(0, NFIELDS).reduce((acc, name, i) => (acc[i] = name, acc), {}); }
    function loadFieldNames(){ return Object.assign(defaultFieldNames(), loadJSON(FIELDS_KEY, {}) || {}); }
    function saveFieldNames(obj){ saveJSON(FIELDS_KEY, obj); }

    function num(el){ if(!el) return null; const v = String(el.value || '').trim(); if(v === '') return null; const n = parseInt(v, 10); return Number.isNaN(n) ? null : n; }
    function sval(r, i, side){ return num(document.getElementById('s' + side + '_' + r + '_' + i)); }
    function slotHasScore(r, i){ return sval(r, i, 'A') != null && sval(r, i, 'B') != null; }
    function key(a, b){ return a < b ? a + '-' + b : b + '-' + a; }
    function fmt(n){ return (n > 0 ? '+' : '') + n; }
    function isFreilos(r, i){
      const M = MATCHES[r]; if(!M || !M[i]) return false;
      const m = M[i];
      if(m.a === 0 || m.b === 0) return true;
      const drop = droppedTeams();
      if((drop.has(m.a) || drop.has(m.b)) && !slotHasScore(r, i)) return true;
      return false;
    }
    function freilosWinner(r, i){
      const M = MATCHES[r]; if(!M || !M[i]) return null;
      const m = M[i];
      if(m.a === 0) return m.b;
      if(m.b === 0) return m.a;
      const drop = droppedTeams();
      if(drop.has(m.a) && !slotHasScore(r, i)) return m.b;
      if(drop.has(m.b) && !slotHasScore(r, i)) return m.a;
      return null;
    }
    function slotComplete(r, i){
      const M = MATCHES[r]; if(!M || !M[i]) return false;
      if(isFreilos(r, i)) return true;
      const a = sval(r, i, 'A'), b = sval(r, i, 'B');
      return a != null && b != null && a !== b;
    }
    function roundComplete(r){
      const M = MATCHES[r]; if(!M || !M.length) return false;
      for(let i=0;i<M.length;i++) if(!slotComplete(r, i)) return false;
      return true;
    }
    function lastPlayedRoundFor(team){
      let last = 0;
      for(let r=1;r<=NROUNDS;r++){
        const M = MATCHES[r]; if(!M) continue;
        for(let i=0;i<M.length;i++){
          const m = M[i];
          if((m.a === team || m.b === team) && slotHasScore(r, i)) last = r;
        }
      }
      return last;
    }
    function findMatch(r, team){
      const M = MATCHES[r]; if(!M) return null;
      for(let i=0;i<M.length;i++) if(M[i].a === team || M[i].b === team) return {match:M[i], index:i};
      return null;
    }
    function statsUpto(upto){
      const st = {};
      for(let t=1;t<=NTEAMS;t++) st[t] = {s:0, bd:0, p:0, g:0};
      for(let r=1;r<=upto;r++){
        const M = MATCHES[r]; if(!M) continue;
        for(let i=0;i<M.length;i++){
          if(!slotComplete(r, i)) continue;
          const m = M[i];
          if(isFreilos(r, i)){
            const winner = freilosWinner(r, i);
            if(winner && st[winner]){ st[winner].s += 1; st[winner].g += 1; }
            continue;
          }
          const sa = sval(r, i, 'A'), sb = sval(r, i, 'B');
          st[m.a].g += 1; st[m.b].g += 1;
          st[m.a].p += sa; st[m.b].p += sb;
          st[m.a].bd += sa - sb; st[m.b].bd += sb - sa;
          if(sa > sb) st[m.a].s += 1; else st[m.b].s += 1;
        }
      }
      return st;
    }
    function direct(a, b){
      for(let r=1;r<=NROUNDS;r++){
        const M = MATCHES[r]; if(!M) continue;
        for(let i=0;i<M.length;i++){
          const m = M[i];
          if(!((m.a === a && m.b === b) || (m.a === b && m.b === a))) continue;
          if(isFreilos(r, i) || !slotComplete(r, i)) return 0;
          const sa = sval(r, i, 'A'), sb = sval(r, i, 'B');
          const wa = m.a === a ? sa : sb;
          const wb = m.a === a ? sb : sa;
          return wa > wb ? 1 : wa < wb ? -1 : 0;
        }
      }
      return 0;
    }
    function sortTeams(ids, upto){
      const st = statsUpto(upto);
      return ids.slice().sort((a, b) => {
        if(st[b].s !== st[a].s) return st[b].s - st[a].s;
        if(st[b].bd !== st[a].bd) return st[b].bd - st[a].bd;
        if(st[b].p !== st[a].p) return st[b].p - st[a].p;
        const d = direct(a, b); if(d !== 0) return -d;
        return a - b;
      });
    }
    function orderUpto(upto){
      const drop = droppedTeams();
      const active = [];
      for(let t=1;t<=NTEAMS;t++) if(!drop.has(t)) active.push(t);
      return sortTeams(active, upto);
    }
    function displayOrderUpto(upto){
      const ids = Array.from({length:NTEAMS}, (_, i) => i + 1);
      return sortTeams(ids, upto);
    }
    function buildMatches(){
      MATCHES = {};
      const r1 = loadRound1();
      MATCHES[1] = r1.map((p, i) => ({a:p[0], b:p[1], field:getFieldName(i)}));
      for(let r=2;r<=NROUNDS;r++){
        if(!roundComplete(r - 1)) break;
        const active = [];
        const drop = droppedTeams();
        for(let t=1;t<=NTEAMS;t++) if(!drop.has(t)) active.push(t);
        const pairingList = active.slice();
        if(pairingList.length % 2 === 1) pairingList.push(0);
        const order = orderUpto(r - 1);
        const rank = {};
        order.forEach((t, i) => rank[t] = i);
        pairingList.sort((a, b) => { if(a === 0) return 1; if(b === 0) return -1; return (rank[a] ?? 99) - (rank[b] ?? 99); });
        const played = new Set();
        for(let pr=1;pr<r;pr++){
          const M = MATCHES[pr];
          if(!M) continue;
          M.forEach(m => { if(m.a > 0 && m.b > 0) played.add(key(m.a, m.b)); });
        }
        const rem = pairingList.slice();
        const pairs = [];
        while(rem.length){
          const a = rem.shift();
          let j = 0;
          while(j < rem.length && a > 0 && rem[j] > 0 && played.has(key(a, rem[j]))) j++;
          if(j >= rem.length) j = 0;
          pairs.push([a, rem.splice(j, 1)[0]]);
        }
        MATCHES[r] = pairs.map((p, i) => ({a:p[0], b:p[1], field:getFieldName(i % NFIELDS)}));
      }
    }
    function setHtml(id, html){ const el = document.getElementById(id); if(el) el.innerHTML = html || ''; }
    function applyTimes(){
      const startMin = toMin(document.getElementById('startTime')?.value) ?? BASE_START;
      const endMinRaw = toMin(document.getElementById('endTime')?.value);
      const endMin = endMinRaw != null && endMinRaw > startMin ? endMinRaw : Math.max(startMin + 30, BASE_END);
      const total = Math.max(30, endMin - startMin);
      const slotMin = total / NROUNDS;
      const mode = MODE_TABLE.find(m => slotMin >= m.min)?.mode || '⚠ zu kurz';
      const durText = '≈ ' + Math.round(slotMin) + ' Min./Runde · ' + mode;
      document.querySelectorAll('.rmode').forEach(el => el.textContent = mode);
      const timeColor = slotMin >= 28 ? '#2a7a2a' : slotMin >= 20 ? '#c67c00' : '#c00';
      const info1 = document.getElementById('roundDurInfo');
      const info2 = document.getElementById('roundDurInfo2');
      if(info1){ info1.textContent = durText; info1.style.color = timeColor; }
      if(info2){ info2.textContent = durText; info2.style.color = timeColor; }
      const main = document.getElementById('mainTimeText');
      if(main) main.textContent = fromMin(startMin) + '–' + fromMin(endMin);
      document.querySelectorAll('.tt[data-round]').forEach(el => {
        const r = +el.dataset.round;
        const roundStart = startMin + (r - 1) * slotMin;
        const roundEnd = roundStart + slotMin * 0.65;
        el.textContent = 'Runde ' + r + ' · ' + fromMin(roundStart) + '–' + fromMin(roundEnd);
      });
    }
    function updateTeamLegends(){
      let html = '';
      for(let t=1;t<=NTEAMS;t++) html += '<span><strong>Team ' + t + '</strong>' + (teamNameOf(t) ? '=' + escapeHtml(teamNameOf(t)) : '') + (droppedTeams().has(t) ? ' <span class="dropped-note">(ausgefallen)</span>' : '') + '</span>';
      document.querySelectorAll('.team-legend').forEach(el => el.innerHTML = html);
    }
    function updateNameCells(){
      for(let t=1;t<=NTEAMS;t++){
        setHtml('cteam_' + t, droppedTeams().has(t) ? '<span class="dropped-team">Team ' + t + '</span>' : 'Team ' + t);
        document.querySelectorAll('[data-team-name="' + t + '"]').forEach(el => el.innerHTML = teamNameCell(t));
        const row = document.getElementById('ctr_' + t);
        if(row) row.classList.toggle('drop-row', droppedTeams().has(t));
      }
    }
    function setScorePairState(r, i, state){
      ['A','B'].forEach(side => {
        const el = document.getElementById('s' + side + '_' + r + '_' + i);
        if(!el) return;
        el.disabled = !state.enabled;
        if(state.clear) el.value = '';
        el.placeholder = state.placeholder || '';
      });
    }
    function winnerOf(r, i){
      if(!slotComplete(r, i)) return null;
      const m = MATCHES[r][i];
      if(isFreilos(r, i)) return freilosWinner(r, i);
      return sval(r, i, 'A') > sval(r, i, 'B') ? m.a : m.b;
    }
    function renderRounds(){
      for(let r=1;r<=NROUNDS;r++){
        const M = MATCHES[r] || [];
        for(let i=0;i<NFIELDS;i++){
          const m = M[i];
          if(!m){
            setHtml('rA_' + r + '_' + i, '');
            setHtml('rB_' + r + '_' + i, '');
            setHtml('rw_' + r + '_' + i, '');
            setScorePairState(r, i, {enabled:false, clear:true, placeholder:''});
            continue;
          }
          setHtml('rA_' + r + '_' + i, teamFull(m.a, {markDropped:true}));
          setHtml('rB_' + r + '_' + i, teamFull(m.b, {markDropped:true}));
          if(m.a === 0 || m.b === 0) setScorePairState(r, i, {enabled:false, clear:true, placeholder:'–'});
          else if(isFreilos(r, i)) setScorePairState(r, i, {enabled:false, clear:true, placeholder:'–'});
          else setScorePairState(r, i, {enabled:true, clear:false, placeholder:''});
          const winner = winnerOf(r, i);
          if(winner){
            setHtml('rw_' + r + '_' + i, isFreilos(r, i) ? teamFull(winner, {markDropped:true}) + ' <span class="bye-team">(Freilos)</span>' : teamFull(winner, {markDropped:true}));
          } else {
            setHtml('rw_' + r + '_' + i, '');
          }
        }
      }
    }
    function renderCentral(){
      for(let r=1;r<=NROUNDS;r++){
        const st = statsUpto(r);
        const activeOrder = roundComplete(r) ? orderUpto(r) : null;
        const activePlace = {};
        if(activeOrder) activeOrder.forEach((t, idx) => activePlace[t] = idx + 1);
        for(let t=1;t<=NTEAMS;t++){
          const found = findMatch(r, t);
          let html = '';
          if(found && slotComplete(r, found.index)){
            const {match, index} = found;
            if(isFreilos(r, index)){
              const winner = freilosWinner(r, index);
              if(t === winner) html = 'Freilos S<br><span>Σ ' + st[t].s + '/' + fmt(st[t].bd) + '/' + st[t].p + '</span>';
              else html = 'ausgef.<br><span>Σ ' + st[t].s + '/' + fmt(st[t].bd) + '/' + st[t].p + '</span>';
            } else {
              const own = match.a === t ? sval(r, index, 'A') : sval(r, index, 'B');
              const opp = match.a === t ? sval(r, index, 'B') : sval(r, index, 'A');
              const wl = own > opp ? 'S' : 'N';
              html = own + ':' + opp + ' ' + wl + '<br><span>Σ ' + st[t].s + '/' + fmt(st[t].bd) + '/' + st[t].p + '</span>';
            }
          } else if(droppedTeams().has(t) && r > lastPlayedRoundFor(t)) {
            html = 'ausgef.<br><span>Σ ' + st[t].s + '/' + fmt(st[t].bd) + '/' + st[t].p + '</span>';
          }
          setHtml('ct_' + t + '_' + r, html);
          setHtml('cp_' + t + '_' + r, roundComplete(r) ? (activePlace[t] ? String(activePlace[t]) : '–') : '');
        }
      }
    }
    function markScores(){
      document.querySelectorAll('input.score').forEach(inp => inp.classList.remove('win', 'invalid'));
      document.querySelectorAll('input.score').forEach(inp => {
        if(inp.disabled) return;
        const m = /^s(A|B)_(\d+)_(\d+)$/.exec(inp.id); if(!m) return;
        const other = document.getElementById('s' + (m[1] === 'A' ? 'B' : 'A') + '_' + m[2] + '_' + m[3]);
        const a = num(inp), b = num(other); if(a == null || b == null) return;
        if(Math.abs(a - b) < 2) inp.classList.add('invalid'); else if(a > b) inp.classList.add('win');
      });
    }
    function updateLive(){
      const box = document.getElementById('livebox'); if(!box) return;
      let last = 0;
      for(let r=1;r<=NROUNDS;r++) if(roundComplete(r)) last = r;
      if(last === 0){ box.innerHTML = '<em>Noch keine vollständige Runde gespielt – sobald eine Runde komplett ist, erscheinen hier Tabelle und nächste Paarungen.</em>'; return; }
      const st = statsUpto(last);
      const ord = displayOrderUpto(last);
      let html = '<h3>Tabelle nach Runde ' + last + '</h3><table class="livetab"><tr><th>Pl</th><th>Team</th><th>S</th><th>BD</th><th>+P</th></tr>';
      ord.forEach((t, idx) => {
        html += '<tr' + (droppedTeams().has(t) ? ' class="drop-row"' : '') + '><td>' + (idx + 1) + '</td><td>' + teamFull(t, {markDropped:true}) + '</td><td>' + st[t].s + '</td><td>' + fmt(st[t].bd) + '</td><td>' + st[t].p + '</td></tr>';
      });
      html += '</table>';
      const nr = last + 1;
      if(nr <= NROUNDS && MATCHES[nr]){
        html += '<h3>Paarungen Runde ' + nr + '</h3><table class="livetab">';
        MATCHES[nr].forEach(m => {
          html += '<tr><td>' + escapeHtml(m.field) + '</td><td>' + teamFull(m.a, {markDropped:true}) + '</td><td>vs</td><td>' + teamFull(m.b, {markDropped:true}) + '</td></tr>';
        });
        html += '</table>';
      }
      box.innerHTML = html;
    }
    function computeAll(){
      buildMatches();
      applyTimes();
      updateTeamLegends();
      updateNameCells();
      renderRounds();
      renderCentral();
      markScores();
      updateLive();
      registerSession();
    }
    document.addEventListener('keydown', e => {
      if(e.key !== 'Enter') return;
      const el = e.target;
      if(!el || !el.classList || !el.classList.contains('score')) return;
      e.preventDefault();
      const list = Array.from(document.querySelectorAll('input.score:not([disabled])'));
      const idx = list.indexOf(el);
      if(idx >= 0 && idx < list.length - 1){ list[idx + 1].focus(); list[idx + 1].select?.(); }
    });
    loadCfg();
    renderApp();
  </script>
</body>
